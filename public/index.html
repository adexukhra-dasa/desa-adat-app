<!DOCTYPE html>
<html>
<head>
<title>Dashboard Desa Adat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
    <h4 class="logo">🏛 Desa Adat</h4>

    <button onclick="showMenu('utama')" class="menu-btn">Dashboard</button>
    <button onclick="showMenu('data')" class="menu-btn">Data Krama</button>
    <button onclick="logout()" class="menu-btn text-danger">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="utama">
    <h3>Dashboard</h3>

    <div class="row">

        <div class="col-md-3">
            <div class="stat blue">
                <h5>Jumlah KK</h5>
                <h2 id="totalKK">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="stat green">
                <h5>Jumlah Krama</h5>
                <h2 id="totalWarga">0</h2>
            </div>
        </div>

    </div>

    <canvas id="chart" class="mt-4"></canvas>
</div>

<!-- DATA -->
<div id="data" style="display:none;">

    <h3>Data Krama</h3>

    <input id="kk" class="form-control mb-2" placeholder="No KK">
    <input id="nama" class="form-control mb-2" placeholder="Nama">

    <select id="status" class="form-control mb-2">
        <option>Kepala Keluarga</option>
        <option>Anggota</option>
    </select>

    <select id="jenis" class="form-control mb-2">
        <option>Krama Desa</option>
        <option>Krama Tamiu</option>
        <option>Tamiu</option>
    </select>

    <select id="gender" class="form-control mb-2">
        <option>Lanang</option>
        <option>Istri</option>
    </select>

    <button onclick="tambah()" class="btn btn-primary mb-3">Simpan</button>

    <div id="list"></div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
