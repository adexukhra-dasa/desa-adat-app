<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Desa Adat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="d-flex">

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="logo">🏛 Desa Adat</h4>

    <button onclick="showMenu('utama')" class="menu-btn active">
        <i class="bi bi-grid"></i> Menu Utama
    </button>

    <button onclick="showMenu('kk')" class="menu-btn">
        <i class="bi bi-people"></i> Data Krama
    </button>

    <button onclick="showMenu('rahinan')" class="menu-btn">
        <i class="bi bi-calendar"></i> Rahinan
    </button>

    <button onclick="logout()" class="menu-btn text-danger">
        <i class="bi bi-box-arrow-right"></i> Logout
    </button>
</div>

<!-- CONTENT -->
<div class="content p-4">

<!-- DASHBOARD -->
<div id="utama">
    <h3>Dashboard Desa Adat</h3>

    <div class="row mt-4">

        <!-- TOTAL KK -->
        <div class="col-md-3">
            <div class="card stat-card blue">
                <h5>Jumlah KK</h5>
                <h2 id="totalKK">0</h2>
            </div>
        </div>

        <!-- TOTAL KRAMA -->
        <div class="col-md-3">
            <div class="card stat-card green">
                <h5>Jumlah Krama</h5>
                <h2 id="totalWarga">0</h2>
            </div>
        </div>

    </div>

    <div class="row mt-4">

        <!-- KRAMA DESA -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Krama Desa Adat</h5>
                <p>Lanang: <b id="desa_l">0</b></p>
                <p>Istri: <b id="desa_p">0</b></p>
            </div>
        </div>

        <!-- KRAMA TAMIU -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Krama Tamiu</h5>
                <p>Lanang: <b id="tamiu_l">0</b></p>
                <p>Istri: <b id="tamiu_p">0</b></p>
            </div>
        </div>

        <!-- TAMIU -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Tamiu</h5>
                <p>Lanang: <b id="tamu_l">0</b></p>
                <p>Istri: <b id="tamu_p">0</b></p>
            </div>
        </div>

    </div>
</div>

<!-- DATA KK -->
<div id="kk" style="display:none;">
    <h3>Data Krama Adat</h3>

    <input id="kk_no" placeholder="No KK" class="form-control mb-2">
    <input id="nama" placeholder="Nama" class="form-control mb-2">
    <select id="status" class="form-control mb-2">
        <option>Kepala Keluarga</option>
        <option>Anggota</option>
    </select>

    <button onclick="tambah()" class="btn btn-primary mb-3">Simpan</button>

    <div id="list"></div>
</div>

<!-- RAHINAN -->
<div id="rahinan" style="display:none;">
    <h3>Kalender Rahinan Bali</h3>

    <ul id="rahinanList" class="list-group"></ul>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
