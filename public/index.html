<!DOCTYPE html>
<html>
<head>
    <title>Sistem Data Desa Adat Presana</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
    if (localStorage.getItem("login") !== "true") {
        window.location.href = "/login.html";
    }
    </script>
</head>
<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Sistem Data Desa Adat Presana</h2>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <!-- FORM -->
    <div class="card p-3 mb-4">
        <h5>Input Data Krama</h5>

        <div class="row g-2">
            <div class="col-md-3">
                <input id="nik" class="form-control" placeholder="NIK">
            </div>
            <div class="col-md-3">
                <input id="kk" class="form-control" placeholder="No KK">
            </div>
            <div class="col-md-3">
                <input id="nama" class="form-control" placeholder="Nama">
            </div>
            <div class="col-md-3">
                <input id="nohp" class="form-control" placeholder="No HP">
            </div>

            <div class="col-md-4">
                <input id="alamat" class="form-control" placeholder="Alamat">
            </div>
            <div class="col-md-4">
                <input id="banjar" class="form-control" placeholder="Banjar">
            </div>
            <div class="col-md-4">
                <select id="status" class="form-control">
                    <option value="Tetap">Krama Desa Adat</option>
                    <option value="Tamiu">Krama Tamiu</option>
                    <option value="Pendatang">Tamiu</option>
                </select>
            </div>
        </div>

        <button class="btn btn-primary mt-3" onclick="tambah()">💾 Simpan Data</button>
    </div>

    <!-- SEARCH -->
    <input id="search" class="form-control mb-3" placeholder="🔍 Cari nama / NIK / KK..." onkeyup="cari()">

    <!-- DATA LIST -->
    <div id="list" class="row"></div>

</div>

<script src="script.js"></script>
</body>
</html>
