<!DOCTYPE html>
<html>
<head>
<title>Login Desa Adat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f5f5;
}

.login-box {
    width: 400px;
    margin: 80px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.captcha-box {
    display: flex;
    align-items: center;
    gap: 10px;
}

.captcha-text {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 3px;
    background: #eee;
    padding: 5px 15px;
    user-select: none;
}
</style>

</head>

<body>

<div class="login-box">

    <h4 class="mb-3">Sign In</h4>

    <!-- USERNAME -->
    <label>Username / Email</label>
    <input id="user" class="form-control mb-3" placeholder="Masukkan username">

    <!-- PASSWORD -->
    <label>Password</label>
    <div class="input-group mb-3">
        <input id="pass" type="password" class="form-control">
        <button onclick="togglePass()" class="btn btn-outline-secondary">👁️</button>
    </div>

    <!-- CAPTCHA -->
    <label>Captcha</label>
    <div class="captcha-box mb-3">
        <input id="captchaInput" class="form-control" placeholder="Masukkan captcha">
        <div id="captcha" class="captcha-text"></div>
        <button onclick="generateCaptcha()" class="btn btn-outline-primary">↻</button>
    </div>

    <button onclick="login()" class="btn btn-success w-100">Sign In</button>

</div>

<script>

let captchaCode = "";

// GENERATE CAPTCHA
function generateCaptcha() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789";
    captchaCode = "";

    for (let i = 0; i < 6; i++) {
        captchaCode += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("captcha").innerText = captchaCode;
}

// SHOW / HIDE PASSWORD
function togglePass() {
    const pass = document.getElementById("pass");
    pass.type = pass.type === "password" ? "text" : "password";
}

// LOGIN
function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;
    const captchaInput = document.getElementById("captchaInput").value;

    if (!user || !pass) {
        alert("Isi username dan password!");
        return;
    }

    if (captchaInput !== captchaCode) {
        alert("Captcha salah!");
        generateCaptcha();
        return;
    }

    // LOGIN SEDERHANA
    if (user === "admin" && pass === "123") {
        localStorage.setItem("login", "true");
        window.location.href = "/";
    } else {
        alert("Username atau password salah!");
    }
}

// LOAD CAPTCHA
generateCaptcha();

</script>

</body>
</html>
